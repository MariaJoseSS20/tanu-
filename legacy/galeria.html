<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Momentos Inolvidables - Tänu</title>
    <link rel="icon" type="image/png" href="images/logo/tanu.png">
    <link rel="stylesheet" href="styles.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gallery-hero {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('images/gallery/IMG_3728.jpg');
            background-size: cover;
            background-position: center;
            height: 50vh;
            min-height: 400px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 76px;
        }
        .gallery-hero h1 {
            font-size: 3.5rem;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent fixed-top" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="images/logo/tanu.png" alt="Tänu" height="60">
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav gap-3">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="index.html#servicios">Servicios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="index.html#tours">Tours</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="index.html#transporte">Transporte</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="galeria.html">Galería</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="index.html#blog">Blog</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-outline-light rounded-pill" href="index.html#contacto">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="gallery-hero">
            <h1>Galería de Momentos Inolvidables</h1>
        </div>
    </header>

    <section class="section">
        <div class="gallery-album-container">
            <div id="galleryGrid" class="gallery-album-grid">
                <!-- Las fotos se generan dinámicamente con JavaScript -->
            </div>
            <div class="gallery-pagination">
                <button id="prevPage" class="pagination-btn" onclick="changePage(-1)">← Anterior</button>
                <span id="pageInfo" class="page-info">Página <span id="currentPage">1</span> de <span id="totalPages">1</span></span>
                <button id="nextPage" class="pagination-btn" onclick="changePage(1)">Siguiente →</button>
            </div>
        </div>
    </section>

    <!-- Modal Lightbox para ver imágenes en grande -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-labelledby="lightboxModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="z-index: 1051;"></button>
                <div class="modal-body p-0">
                    <img id="lightboxImage" src="" alt="Imagen ampliada" class="img-fluid rounded">
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Tänu. Todos los derechos reservados.</p>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const navbar = document.querySelector('.navbar');

            // Función para cambiar el estilo del navbar al hacer scroll
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                    navbar.classList.remove('navbar-dark', 'bg-transparent');
                    navbar.classList.add('navbar-light');
                } else {
                    navbar.classList.remove('scrolled', 'navbar-light');
                    navbar.classList.add('navbar-dark', 'bg-transparent');
                }
            });
        });

        // Array de imágenes - AQUÍ PUEDES AGREGAR TODAS LAS FOTOS QUE QUIERAS
        const galleryImages = [
            { thumb: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 1' },
            { thumb: 'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 2' },
            { thumb: 'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 3' },
            { thumb: 'https://images.unsplash.com/photo-1465101178521-c1a9136a3b99?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1465101178521-c1a9136a3b99?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 4' },
            { thumb: 'https://images.unsplash.com/photo-1559827260-dc66d52bef19?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1559827260-dc66d52bef19?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 5' },
            { thumb: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 6' },
            { thumb: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 7' },
            { thumb: 'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 8' },
            { thumb: 'https://images.unsplash.com/photo-1570125909517-53cb21c89ff2?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1570125909517-53cb21c89ff2?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 9' },
            { thumb: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 10' },
            { thumb: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 11' },
            { thumb: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 12' },
            { thumb: 'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 13' },
            { thumb: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 14' },
            { thumb: 'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 15' },
            { thumb: 'https://images.unsplash.com/photo-1465101178521-c1a9136a3b99?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1465101178521-c1a9136a3b99?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 16' },
            { thumb: 'https://images.unsplash.com/photo-1559827260-dc66d52bef19?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1559827260-dc66d52bef19?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 17' },
            { thumb: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 18' },
            { thumb: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 19' },
            { thumb: 'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 20' },
            { thumb: 'https://images.unsplash.com/photo-1570125909517-53cb21c89ff2?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1570125909517-53cb21c89ff2?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 21' },
            { thumb: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 22' },
            { thumb: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=400&q=80', full: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=1200&q=80', alt: 'Momento inolvidable 23' }
        ];

        // Configuración de paginación
        const photosPerPage = 12; // Fotos por página
        let currentPage = 1;

        // Función para calcular el total de páginas
        function getTotalPages() {
            return Math.ceil(galleryImages.length / photosPerPage);
        }

        // Función para renderizar las fotos de la página actual
        function renderGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            const startIndex = (currentPage - 1) * photosPerPage;
            const endIndex = startIndex + photosPerPage;
            const currentPhotos = galleryImages.slice(startIndex, endIndex);

            galleryGrid.innerHTML = '';

            currentPhotos.forEach((photo, index) => {
                const globalIndex = startIndex + index;
                const photoFrame = document.createElement('div');
                photoFrame.className = 'photo-frame';
                photoFrame.setAttribute('data-bs-toggle', 'modal');
                photoFrame.setAttribute('data-bs-target', '#lightboxModal');
                photoFrame.onclick = () => openLightbox(globalIndex);
                
                // Rotación aleatoria para cada foto
                const rotation = (Math.random() * 6 - 3).toFixed(1);
                photoFrame.style.setProperty('--rotation', rotation + 'deg');

                photoFrame.innerHTML = `
                    <div class="photo-matte">
                        <img src="${photo.thumb}" alt="${photo.alt}" loading="lazy">
                    </div>
                `;
                
                galleryGrid.appendChild(photoFrame);
            });

            // Actualizar información de paginación
            updatePagination();
        }

        // Función para actualizar los controles de paginación
        function updatePagination() {
            const totalPages = getTotalPages();
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            // Habilitar/deshabilitar botones
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        // Función para cambiar de página
        function changePage(direction) {
            const totalPages = getTotalPages();
            const newPage = currentPage + direction;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderGallery();
                // Scroll suave hacia arriba de la galería
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Función para abrir el lightbox con la imagen seleccionada
        function openLightbox(index) {
            const lightboxImage = document.getElementById('lightboxImage');
            lightboxImage.src = galleryImages[index].full;
            lightboxImage.alt = galleryImages[index].alt;
        }

        // Inicializar la galería al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            renderGallery();
        });
    </script>
</body>
</html>
